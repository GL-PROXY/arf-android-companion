name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove local.properties
        run: rm -f local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Build debug APK
        run: gradle --no-build-cache assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG="build-$(git rev-parse --short HEAD)"
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)
          gh release create "$TAG" "$APK" \
            --title "Build $TAG" \
            --notes "Auto-built from commit $(git rev-parse --short HEAD)" \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
